<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Spice Garden</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c9a84c; --gold-dark: #8a6a1f; --deep: #0d0a07; --dark: #1a1208; --card: #1f1810; --cream: #f5ede0; --muted: #9e8a72; }
    body { background: var(--deep); color: var(--cream); font-family: 'Lato', sans-serif; font-weight: 300; min-height: 100vh; }
    nav { background: rgba(13,10,7,0.95); border-bottom: 1px solid rgba(201,168,76,0.2); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-logo { font-family: 'Cinzel', serif; color: var(--gold); letter-spacing: 3px; font-size: 1rem; text-decoration: none; }
    .nav-sub { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }
    .nav-link { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-link:hover { color: var(--gold); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
    .stat-card { background: var(--card); border: 1px solid rgba(201,168,76,0.12); padding: 20px 24px; }
    .stat-num { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold); }
    .stat-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    /* TABS */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid rgba(201,168,76,0.12); }
    .tab { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; padding: 14px 28px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.3s; background: none; border-top: none; border-left: none; border-right: none; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab:hover { color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* FILTERS */
    .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    select.filter { background: var(--card); border: 1px solid rgba(201,168,76,0.2); color: var(--cream); font-family: 'Lato'; font-size: 11px; padding: 8px 14px; outline: none; cursor: pointer; }
    select.filter:focus { border-color: var(--gold); }
    select.filter option { background: var(--dark); }
    .btn-refresh { background: transparent; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; padding: 8px 18px; cursor: pointer; transition: all 0.3s; }
    .btn-refresh:hover { background: rgba(201,168,76,0.1); }

    /* TABLE */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(201,168,76,0.15); }
    .data-table td { font-size: 12px; color: var(--cream); padding: 14px 16px; border-bottom: 1px solid rgba(201,168,76,0.06); vertical-align: top; }
    .data-table tr:hover td { background: rgba(201,168,76,0.03); }
    .data-table .muted { color: var(--muted); font-size: 11px; }

    /* STATUS BADGES */
    .status { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 0; font-weight: 700; }
    .s-pending   { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .s-confirmed { background: rgba(100,200,100,0.12); color: #6dc86d; border: 1px solid rgba(100,200,100,0.3); }
    .s-cancelled { background: rgba(200,80,80,0.12); color: #e07070; border: 1px solid rgba(200,80,80,0.3); }
    .s-completed { background: rgba(100,150,255,0.12); color: #8ab4ff; border: 1px solid rgba(100,150,255,0.3); }
    .s-received  { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .s-preparing { background: rgba(255,180,50,0.12); color: #ffb432; border: 1px solid rgba(255,180,50,0.3); }
    .s-ready     { background: rgba(100,200,100,0.12); color: #6dc86d; border: 1px solid rgba(100,200,100,0.3); }
    .s-out_for_delivery { background: rgba(100,150,255,0.12); color: #8ab4ff; border: 1px solid rgba(100,150,255,0.3); }
    .s-delivered { background: rgba(100,200,100,0.12); color: #6dc86d; border: 1px solid rgba(100,200,100,0.3); }

    /* STATUS UPDATE SELECT */
    select.status-select { background: var(--dark); border: 1px solid rgba(201,168,76,0.2); color: var(--cream); font-family: 'Lato'; font-size: 10px; padding: 5px 10px; outline: none; cursor: pointer; margin-top: 6px; }
    select.status-select:focus { border-color: var(--gold); }

    /* ITEMS LIST */
    .items-mini { font-size: 11px; color: var(--muted); line-height: 1.8; }
    .items-mini span { color: var(--cream); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; letter-spacing: 1px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

    @media(max-width:768px) { .stats { grid-template-columns: 1fr 1fr; } .data-table { font-size: 11px; } }
  </style>
</head>
<body>

<nav>
  <div>
    <a href="main.html" class="nav-logo">Spice Garden</a>
    <span class="nav-sub" style="margin-left:16px;">Admin</span>
  </div>
  <a href="main.html" class="nav-link">← Back to Website</a>
</nav>

<div class="wrap">

  <!-- STATS -->
  <div class="stats" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="st-total-res">—</div><div class="stat-label">Total Reservations</div></div>
    <div class="stat-card"><div class="stat-num" id="st-pending-res">—</div><div class="stat-label">Pending Bookings</div></div>
    <div class="stat-card"><div class="stat-num" id="st-total-ord">—</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-num" id="st-active-ord">—</div><div class="stat-label">Active Orders</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" type="button" onclick="switchTab(event, 'reservations')">Reservations</button>
    <button class="tab" type="button" onclick="switchTab(event, 'orders')">Takeaway Orders</button>
  </div>

  <!-- RESERVATIONS PANEL -->
  <div class="tab-panel active" id="panel-reservations">
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <select class="filter" id="res-status-filter" onchange="loadReservations()">
        <option value="">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="confirmed">Confirmed</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <input type="date" class="filter" id="res-date-filter" onchange="loadReservations()" style="background:var(--card);border:1px solid rgba(201,168,76,0.2);color:var(--cream);font-family:Lato;font-size:11px;padding:8px 14px;outline:none;">
      <button class="btn-refresh" type="button" onclick="refreshAdmin()">↻ Refresh</button>
    </div>
    <div id="res-loading" class="loading">Loading…</div>
    <div id="res-table-wrap"></div>
  </div>

  <!-- ORDERS PANEL -->
  <div class="tab-panel" id="panel-orders">
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <select class="filter" id="ord-status-filter" onchange="loadOrders()">
        <option value="">All Statuses</option>
        <option value="received">Received</option>
        <option value="preparing">Preparing</option>
        <option value="ready">Ready</option>
        <option value="out_for_delivery">Out for Delivery</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select class="filter" id="ord-mode-filter" onchange="loadOrders()">
        <option value="">All Modes</option>
        <option value="pickup">Pickup</option>
        <option value="delivery">Delivery</option>
      </select>
      <button class="btn-refresh" type="button" onclick="refreshAdmin()">↻ Refresh</button>
    </div>
    <div id="ord-loading" class="loading">Loading…</div>
    <div id="ord-table-wrap"></div>
  </div>

</div>

<script>
  const API_BASE = 'https://restaurant-website-0cxq.onrender.com/api';

  // ── TABS ──────────────────────────────────────────────────────────────────
  function switchTab(evt, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    evt.target.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ── FORMAT DATE ───────────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })
      + ' ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }

  // ── LOAD STATS ────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const [resRes, ordRes] = await Promise.all([
        fetch(`${API_BASE}/reservations`),
        fetch(`${API_BASE}/orders`)
      ]);
      const resData = await resRes.json();
      const ordData = await ordRes.json();
      const reservations = resData.data || [];
      const orders = ordData.data || [];
      document.getElementById('st-total-res').textContent = reservations.length || '0';
      document.getElementById('st-pending-res').textContent =
        reservations.filter(r => r.status === 'pending').length;
      document.getElementById('st-total-ord').textContent = orders.length || '0';
      document.getElementById('st-active-ord').textContent =
        orders.filter(o => ['received','preparing','ready','out_for_delivery'].includes(o.status)).length;
    } catch(e) {
      console.error('Stats error:', e);
    }
  }

  // ── LOAD RESERVATIONS ─────────────────────────────────────────────────────
  async function loadReservations() {
    document.getElementById('res-loading').style.display = 'block';
    document.getElementById('res-table-wrap').innerHTML = '';
    const status = document.getElementById('res-status-filter').value;
    const date = document.getElementById('res-date-filter').value;
    let url = `${API_BASE}/reservations?`;
    if (status) url += `status=${status}&`;
    if (date) url += `date=${date}&`;
    try {
      const res = await fetch(url);
      const json = await res.json();
      const data = json.data || [];
      document.getElementById('res-loading').style.display = 'none';
      if (!data.length) {
        document.getElementById('res-table-wrap').innerHTML =
          '<div class="empty-state">No reservations found.</div>';
        return;
      }
      document.getElementById('res-table-wrap').innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Date</th><th>Name</th><th>Phone</th>
            <th>Table</th><th>Zone</th><th>Occasion</th>
            <th>Notes</th><th>Status</th><th>Booked At</th>
          </tr></thead>
          <tbody>
            ${data.map(r => `
              <tr>
                <td>${r.date}</td>
                <td>${r.name}</td>
                <td class="muted">${r.phone}</td>
                <td><strong>${r.tableNum}</strong></td>
                <td class="muted">${r.tableZone}</td>
                <td class="muted">${r.occasion || '—'}</td>
                <td class="muted" style="max-width:160px;">${r.notes || '—'}</td>
                <td>
                  <span class="status s-${r.status}">${r.status}</span>
                  <br>
                  <select class="status-select" onchange="updateReservationStatus('${r._id}', this.value)">
                    <option value="">Update…</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                </td>
                <td class="muted">${fmtDate(r.createdAt)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(e) {
      document.getElementById('res-loading').style.display = 'none';
      document.getElementById('res-table-wrap').innerHTML =
        '<div class="empty-state">Error loading reservations. Check your API.</div>';
    }
  }

  // ── LOAD ORDERS ──────────────────────────────────────────────────────────
  async function loadOrders() {
    document.getElementById('ord-loading').style.display = 'block';
    document.getElementById('ord-table-wrap').innerHTML = '';
    const status = document.getElementById('ord-status-filter').value;
    const mode = document.getElementById('ord-mode-filter').value;
    let url = `${API_BASE}/orders?`;
    if (status) url += `status=${status}&`;
    if (mode) url += `deliveryMode=${mode}&`;
    try {
      const res = await fetch(url);
      const json = await res.json();
      const data = json.data || [];
      document.getElementById('ord-loading').style.display = 'none';
      if (!data.length) {
        document.getElementById('ord-table-wrap').innerHTML =
          '<div class="empty-state">No orders found.</div>';
        return;
      }
      document.getElementById('ord-table-wrap').innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Customer</th><th>Phone</th><th>Items</th>
            <th>Total</th><th>Mode</th><th>Address</th>
            <th>Status</th><th>Ordered At</th>
          </tr></thead>
          <tbody>
            ${data.map(o => `
              <tr>
                <td>${o.customerName}</td>
                <td class="muted">${o.customerPhone}</td>
                <td>
                  <div class="items-mini">
                    ${(o.items||[]).map(i => `<span>${i.qty}× ${i.name}</span> <span class="muted">₹${i.subtotal}</span><br>`).join('')}
                  </div>
                </td>
                <td><strong>₹${o.totalAmount}</strong>
                  <div class="muted" style="font-size:10px;">+₹${o.packingCharge} packing${o.deliveryCharge ? ' +₹'+o.deliveryCharge+' del' : ''}</div>
                </td>
                <td><span class="status ${o.deliveryMode === 'pickup' ? 's-ready' : 's-pending'}">${o.deliveryMode}</span></td>
                <td class="muted" style="max-width:140px;">${o.deliveryAddress || '—'}</td>
                <td>
                  <span class="status s-${o.status}">${o.status.replace(/_/g,' ')}</span>
                  <br>
                  <select class="status-select" onchange="updateOrderStatus('${o._id}', this.value)">
                    <option value="">Update…</option>
                    <option value="received">Received</option>
                    <option value="preparing">Preparing</option>
                    <option value="ready">Ready</option>
                    <option value="out_for_delivery">Out for Delivery</option>
                    <option value="delivered">Delivered</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                </td>
                <td class="muted">${fmtDate(o.createdAt)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } catch(e) {
      document.getElementById('ord-loading').style.display = 'none';
      document.getElementById('ord-table-wrap').innerHTML =
        '<div class="empty-state">Error loading orders. Check your API.</div>';
    }
  }

  // ── UPDATE STATUS ─────────────────────────────────────────────────────────
  async function updateReservationStatus(id, status) {
    if (!status) return;
    try {
      await fetch(`${API_BASE}/reservations/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadReservations();
      loadStats();
    } catch(e) { console.error('Update failed:', e); }
  }

  async function updateOrderStatus(id, status) {
    if (!status) return;
    try {
      await fetch(`${API_BASE}/orders/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadOrders();
      loadStats();
    } catch(e) { console.error('Update failed:', e); }
  }

  function refreshAdmin() {
    loadStats();
    loadReservations();
    loadOrders();
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  loadStats();
  loadReservations();
  loadOrders();

  // Auto-refresh every 60 seconds
  setInterval(refreshAdmin, 60000);
</script>

</body>
</html>
